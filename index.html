<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>
    <script src="script.js" defer></script>
    <script src="https://kit.fontawesome.com/99fd91ee1f.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="playerCon">
            <div class="textCon">
                <h1>Relaxing Song</h1>
                <p id="songName"></p>
            </div>
            <div class="imageCon">
                <img src="covers/aaj din chadeya.jpg" alt="">
            </div>
            <div class="controlCon">
                <div class="rangeCon">
                    <span class="left">00:00</span><span class="right">00:00</span>
                    <input type="range" name="" id="" value="0">
                </div>
                <div class="buttonsCon">
                    <i id="preBtn" class="fa-solid fa-angle-left"></i>
                    <i id="playBtn" class="fa-solid fa-play"></i>
                    <i id="nextBtn" class="fa-solid fa-angle-right"></i>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
